<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Klyx Fragrances</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="login">
    <div class="promo-banner">
      <div class="container">
        <div class="promo-banner-content">
          <span class="promo-text">50% off storewide — curated scents</span>
          <a class="promo-shop-btn" href="cart.html">Shop now</a>
        </div>
      </div>
    </div>

    <header class="site-header">
      <div class="container header-bar">
        <a class="brand" href="home.html">
          <img
            src="images/klyx-logo.png"
            width="180"
            height="56"
            alt="Klyx Fragrances logo: stylized red letter K shaped like a fragrance bottle on charcoal"
          />
        </a>
      </div>
      <nav class="main-nav site-nav" aria-label="Primary">
        <div class="container">
          <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="checkout.html">Checkout</a></li>
            <li><a href="invoice.html">Invoice</a></li>
            <li><a href="index.html" aria-current="page">Login</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="about.html">About</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main id="main">
      <div class="page-wrap">
        <section class="panel" aria-labelledby="login-heading">
          <p class="tagline">Welcome back</p>
          <h1 id="login-heading">Login</h1>
          <p class="lead">Sign in with your TRN and password (max 3 attempts per session).</p>

          <form id="login-form" class="form-grid" action="#" method="get">
            <div>
              <label for="login-trn">TRN</label>
              <input id="login-trn" name="trn" type="text" inputmode="numeric" autocomplete="off" placeholder="000-000-000" required />
            </div>
            <div>
              <label for="login-password">Password</label>
              <input id="login-password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <p id="login-msg" class="field-hint" role="status"></p>
            <div class="form-actions">
              <button class="btn btn-primary" type="submit">Sign in</button>
              <a class="btn btn-outline" href="register.html">Need an account?</a>
            </div>
          </form>

          <details class="panel-details">
            <summary>Reset password</summary>
            <form id="reset-password-form" class="form-grid" action="#" method="get" style="margin-top: 1rem">
              <div>
                <label for="reset-trn">TRN</label>
                <input id="reset-trn" type="text" inputmode="numeric" placeholder="000-000-000" required />
              </div>
              <div>
                <label for="reset-password">New password</label>
                <input id="reset-password" type="password" autocomplete="new-password" required />
              </div>
              <div>
                <label for="reset-password-confirm">Confirm new password</label>
                <input id="reset-password-confirm" type="password" autocomplete="new-password" required />
              </div>
              <p id="reset-msg" class="field-hint" role="status"></p>
              <div class="form-actions">
                <button class="btn btn-primary" type="submit">Update password</button>
              </div>
            </form>
          </details>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>&copy; 2026 Klyx Fragrances</p>
        <p><a href="about.html">About Us</a></p>
      </div>
    </footer>
    <script src="js/script.js" defer></script>
  </body>
</html>
